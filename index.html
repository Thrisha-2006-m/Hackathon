<!DOCTYPE html>
<html>
<head>
    <title>CampusConnect</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f9;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, button {
            padding: 8px;
            margin: 5px;
            width: 80%;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<h1>🚀 CampusConnect</h1>

<div class="box">
    <h3>Login</h3>
    <input id="name" placeholder="Enter Name"><br>
    <button onclick="login()">Login</button>
</div>

<div class="box" id="dashboard" style="display:none;">
    <h3>Welcome <span id="user"></span></h3>

    <h4>📋 Tasks</h4>
    <input id="taskInput" placeholder="Enter task">
    <button onclick="addTask()">Add Task</button>
    <ul id="taskList"></ul>

    <h4>🏆 Points: <span id="points">0</span></h4>

    <h4>🤖 GitHub Analyzer</h4>
    <input id="githubUser" placeholder="GitHub Username">
    <button onclick="analyze()">Analyze</button>

    <pre id="result"></pre>
</div>

<script>
let points = 0;

function login() {
    const name = document.getElementById("name").value;
    if(name === "") return alert("Enter name");

    document.getElementById("user").innerText = name;
    document.getElementById("dashboard").style.display = "block";
}

function addTask() {
    const task = document.getElementById("taskInput").value;
    if(task === "") return;

    const li = document.createElement("li");
    li.innerText = task + " ✔";
    document.getElementById("taskList").appendChild(li);

    points += 10;
    document.getElementById("points").innerText = points;
}

async function analyze() {
    const username = document.getElementById("githubUser").value;

    const res = await fetch(`https://api.github.com/users/${username}`);
    const data = await res.json();

    let score = 0;

    if (data.public_repos > 5) score += 30;
    if (data.followers > 10) score += 20;
    if (data.following > 5) score += 10;

    let suggestion = "Improve README & add better projects";

    document.getElementById("result").innerText =
`👤 User: ${data.login}
📦 Repos: ${data.public_repos}
👥 Followers: ${data.followers}

⭐ Score: ${score}/100

💡 Suggestion:
${suggestion}`;
}
</script>

</body>
</html>
